<!DOCTYPE html>
<html lang="en" x-data="gallery()" x-init="init()">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dog Gallery</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            cream: '#f5f2ec',
            ink:   '#111111',
          }
        }
      }
    }
  </script>
  <style>
    [x-cloak] { display: none !important; }

    /* Masonry layout using CSS columns */
    .masonry {
      column-count: 2;
      column-gap: 12px;
    }
    @media (min-width: 640px)  { .masonry { column-count: 3; } }
    @media (min-width: 1024px) { .masonry { column-count: 4; } }
    @media (min-width: 1280px) { .masonry { column-count: 5; } }

    .masonry-item {
      break-inside: avoid;
      margin-bottom: 12px;
      display: block;
    }

    /* Lightbox fade */
    .lightbox-enter { animation: fadeIn .18s ease; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    /* Image hover */
    .photo-card img { transition: transform .35s ease, filter .35s ease; }
    .photo-card:hover img { transform: scale(1.03); filter: brightness(.88); }

    /* Loader spinner */
    .spinner {
      width: 28px; height: 28px;
      border: 2.5px solid #ddd;
      border-top-color: #111;
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body class="bg-cream text-ink font-sans min-h-screen" style="font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;">

<!-- ── NAV ── -->
<nav class="sticky top-0 z-40 bg-cream border-b border-ink flex items-center justify-between px-5 md:px-10 h-14">
  <a href="#" class="flex items-center gap-2.5 no-underline">
    <!-- Dachshund mugshot mark -->
    <svg class="w-7 h-7 flex-shrink-0" viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
      <rect x="2" y="2" width="76" height="76" fill="none" stroke="#111" stroke-width="2.5"/>
      <line x1="70" y1="18" x2="78" y2="18" stroke="#111" stroke-width="1.2"/>
      <line x1="70" y1="32" x2="78" y2="32" stroke="#111" stroke-width="1.2"/>
      <line x1="70" y1="46" x2="78" y2="46" stroke="#111" stroke-width="1.2"/>
      <line x1="70" y1="60" x2="78" y2="60" stroke="#111" stroke-width="1.2"/>
      <ellipse cx="38" cy="54" rx="26" ry="12" fill="#5c3a1e"/>
      <ellipse cx="38" cy="33" rx="14" ry="12" fill="#5c3a1e"/>
      <ellipse cx="38" cy="40" rx="8" ry="6" fill="#7a4f2a"/>
      <ellipse cx="25" cy="32" rx="6" ry="12" fill="#3e2210" transform="rotate(-10 25 32)"/>
      <ellipse cx="51" cy="32" rx="6" ry="12" fill="#3e2210" transform="rotate(10 51 32)"/>
      <circle cx="32" cy="30" r="2.5" fill="#0e0600"/>
      <circle cx="44" cy="30" r="2.5" fill="#0e0600"/>
      <ellipse cx="38" cy="38" rx="3" ry="2" fill="#0e0600"/>
      <rect x="20" y="62" width="5" height="10" rx="2.5" fill="#3e2210"/>
      <rect x="30" y="64" width="5" height="8" rx="2.5" fill="#3e2210"/>
      <rect x="41" y="64" width="5" height="8" rx="2.5" fill="#3e2210"/>
      <rect x="51" y="62" width="5" height="10" rx="2.5" fill="#3e2210"/>
    </svg>
    <span class="text-[11px] font-bold tracking-[.2em] uppercase text-ink">Dog Gallery</span>
  </a>

  <!-- Breed filter -->
  <div class="flex items-center gap-3">
    <select
      x-model="selectedBreed"
      @change="filterBreed()"
      class="text-[10px] tracking-[.1em] uppercase border border-ink bg-cream px-3 py-1.5 focus:outline-none cursor-pointer appearance-none"
    >
      <option value="">All Breeds</option>
      <template x-for="breed in breeds" :key="breed">
        <option :value="breed" x-text="breed.replace(/-/g,' ').replace(/\b\w/g,c=>c.toUpperCase())"></option>
      </template>
    </select>
    <span class="text-[9px] tracking-[.14em] uppercase text-gray-400 hidden md:block" x-text="photos.length + ' photos'"></span>
  </div>
</nav>

<!-- ── HERO TEXT ── -->
<div class="px-5 md:px-10 pt-12 pb-8 border-b border-ink flex flex-col md:flex-row md:items-end md:justify-between gap-4">
  <div>
    <h1 class="text-[clamp(40px,7vw,88px)] font-black uppercase leading-[.88] tracking-tight">Dog<br/><span class="text-gray-300">Gallery</span></h1>
  </div>
  <p class="text-[12px] leading-loose text-gray-500 max-w-xs">A collection of good boys and girls. Powered by the Dog CEO API — every photo is the real deal.</p>
</div>

<!-- ── GALLERY ── -->
<main class="px-5 md:px-10 py-10">

  <!-- Loading state -->
  <div x-show="loading && photos.length === 0" class="flex flex-col items-center justify-center py-32 gap-4">
    <div class="spinner"></div>
    <p class="text-[10px] tracking-[.18em] uppercase text-gray-400">Fetching dogs...</p>
  </div>

  <!-- Masonry grid -->
  <div x-show="photos.length > 0" class="masonry">
    <template x-for="(photo, i) in photos" :key="photo.url">
      <div class="masonry-item photo-card cursor-pointer" @click="openLightbox(photo)">
        <div class="overflow-hidden bg-gray-100 relative">
          <img
            :src="photo.url"
            :alt="photo.breed"
            loading="lazy"
            class="w-full block"
            @load="$el.classList.add('loaded')"
          />
        </div>
        <div class="pt-2 pb-1 flex justify-between items-baseline">
          <span class="text-[9.5px] font-semibold tracking-[.1em] uppercase text-ink" x-text="photo.breed"></span>
          <span class="text-[8px] text-gray-400 font-mono" x-text="String(i+1).padStart(3,'0')"></span>
        </div>
      </div>
    </template>
  </div>

  <!-- Load more -->
  <div x-show="photos.length > 0" class="flex justify-center mt-12">
    <button
      @click="loadMore()"
      :disabled="loading"
      class="flex items-center gap-3 border border-ink px-8 py-3 text-[10px] font-semibold tracking-[.2em] uppercase hover:bg-ink hover:text-cream transition-colors disabled:opacity-40 disabled:cursor-not-allowed"
    >
      <span x-show="loading"><div class="spinner !w-4 !h-4 !border-[1.8px]"></div></span>
      <span x-text="loading ? 'Loading...' : 'Load More Dogs'"></span>
    </button>
  </div>

</main>

<!-- ── LIGHTBOX ── -->
<div
  x-show="lightbox"
  x-cloak
  class="fixed inset-0 z-50 bg-black/90 flex items-center justify-center p-4 md:p-10 lightbox-enter"
  @click.self="closeLightbox()"
  @keydown.escape.window="closeLightbox()"
>
  <button
    @click="closeLightbox()"
    class="absolute top-5 right-6 text-white/60 hover:text-white text-2xl leading-none transition-colors"
    aria-label="Close"
  >✕</button>

  <!-- Prev / Next -->
  <button
    @click="prevPhoto()"
    class="absolute left-4 md:left-8 text-white/50 hover:text-white text-3xl leading-none transition-colors select-none"
    aria-label="Previous"
  >‹</button>
  <button
    @click="nextPhoto()"
    class="absolute right-4 md:right-8 text-white/50 hover:text-white text-3xl leading-none transition-colors select-none"
    aria-label="Next"
  >›</button>

  <div class="max-w-3xl w-full flex flex-col items-center gap-4">
    <img
      x-show="activePhoto"
      :src="activePhoto?.url"
      :alt="activePhoto?.breed"
      class="max-h-[80vh] max-w-full object-contain"
    />
    <div class="flex items-center gap-4">
      <span class="text-[10px] font-semibold tracking-[.16em] uppercase text-white/80" x-text="activePhoto?.breed"></span>
      <span class="text-[9px] text-white/30 font-mono" x-text="activeIndex !== null ? String(activeIndex+1).padStart(3,'0') + ' / ' + String(photos.length).padStart(3,'0') : ''"></span>
    </div>
  </div>
</div>

<!-- ── FOOTER ── -->
<footer class="border-t border-ink px-5 md:px-10 py-8 flex justify-between items-center">
  <div class="flex items-center gap-3">
    <svg class="w-7 h-7" viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
      <rect x="2" y="2" width="76" height="76" fill="none" stroke="#ccc" stroke-width="2"/>
      <ellipse cx="38" cy="54" rx="26" ry="12" fill="#ccc"/>
      <ellipse cx="38" cy="33" rx="14" ry="12" fill="#ccc"/>
      <ellipse cx="38" cy="40" rx="8" ry="6" fill="#bbb"/>
      <ellipse cx="25" cy="32" rx="6" ry="12" fill="#bbb" transform="rotate(-10 25 32)"/>
      <ellipse cx="51" cy="32" rx="6" ry="12" fill="#bbb" transform="rotate(10 51 32)"/>
      <circle cx="32" cy="30" r="2.5" fill="#aaa"/>
      <circle cx="44" cy="30" r="2.5" fill="#aaa"/>
    </svg>
    <span class="text-[8.5px] tracking-[.14em] uppercase text-gray-400">Dog Gallery</span>
  </div>
  <span class="text-[8px] text-gray-300 tracking-[.1em]">Photos via dog.ceo</span>
</footer>

<script>
  function gallery() {
    return {
      photos: [],
      breeds: [],
      selectedBreed: '',
      loading: false,
      lightbox: false,
      activePhoto: null,
      activeIndex: null,

      async init() {
        // Load breed list for filter
        try {
          const res = await fetch('https://dog.ceo/api/breeds/list/all');
          const data = await res.json();
          const allBreeds = Object.keys(data.message);
          // Pick a nice curated subset for the dropdown (too many otherwise)
          const featured = ['dachshund','husky','labrador','retriever','poodle','beagle','corgi','boxer','bulldog','shiba','akita','dalmatian','doberman','greyhound','maltese','papillon','pomeranian','pug','samoyed','vizsla'];
          this.breeds = allBreeds.filter(b => featured.includes(b)).sort();
        } catch(e) {}

        await this.loadMore();
      },

      async loadMore() {
        if (this.loading) return;
        this.loading = true;
        try {
          let url = this.selectedBreed
            ? `https://dog.ceo/api/breed/${this.selectedBreed}/images/random/24`
            : 'https://dog.ceo/api/breeds/image/random/24';

          const res = await fetch(url);
          const data = await res.json();
          const newPhotos = data.message.map(url => ({
            url,
            breed: this.breedFromUrl(url)
          }));
          this.photos = [...this.photos, ...newPhotos];
        } catch(e) {
          console.error('Failed to load photos', e);
        }
        this.loading = false;
      },

      async filterBreed() {
        this.photos = [];
        await this.loadMore();
      },

      breedFromUrl(url) {
        // URL format: https://images.dog.ceo/breeds/breed-subbreed/image.jpg
        const match = url.match(/\/breeds\/([^/]+)\//);
        if (!match) return 'unknown';
        return match[1]
          .replace(/-/g, ' ')
          .replace(/\b\w/g, c => c.toUpperCase());
      },

      openLightbox(photo) {
        this.activeIndex = this.photos.indexOf(photo);
        this.activePhoto = photo;
        this.lightbox = true;
        document.body.style.overflow = 'hidden';
      },

      closeLightbox() {
        this.lightbox = false;
        this.activePhoto = null;
        this.activeIndex = null;
        document.body.style.overflow = '';
      },

      prevPhoto() {
        if (this.activeIndex === null) return;
        this.activeIndex = (this.activeIndex - 1 + this.photos.length) % this.photos.length;
        this.activePhoto = this.photos[this.activeIndex];
      },

      nextPhoto() {
        if (this.activeIndex === null) return;
        this.activeIndex = (this.activeIndex + 1) % this.photos.length;
        this.activePhoto = this.photos[this.activeIndex];
      }
    }
  }
</script>

</body>
</html>
